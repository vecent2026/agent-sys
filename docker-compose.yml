services:
  # 基础组件
  mysql:
    image: mysql:8.4.8
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: admin_system
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./services/admin-service/sql/schema.sql:/docker-entrypoint-initdb.d/01_admin_schema.sql
      - ./services/user-service/sql/schema.sql:/docker-entrypoint-initdb.d/02_user_schema.sql
      - ./services/user-service/sql/user_views.sql:/docker-entrypoint-initdb.d/03_user_views.sql
      - ./services/admin-service/sql/v2_tenant_migration.sql:/docker-entrypoint-initdb.d/04_admin_v2_migration.sql
      - ./services/user-service/sql/v2_tenant_migration.sql:/docker-entrypoint-initdb.d/05_user_v2_migration.sql
      - ./infrastructure/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    networks:
      - trae-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4.8
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - trae-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.19.7
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - trae-net
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  zookeeper:
    image: wurstmeister/zookeeper
    container_name: zookeeper
    ports:
      - "2181:2181"
    networks:
      - trae-net

  kafka:
    image: wurstmeister/kafka
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_ADVERTISED_HOST_NAME: kafka
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_CREATE_TOPICS: "sys-log-topic:1:1"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - trae-net
    depends_on:
      - zookeeper

  # 业务服务
  admin-service:
    build: ./services/admin-service
    restart: unless-stopped
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: admin_system
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: root
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ES_URIS: http://elasticsearch:9200
      USER_SERVICE_URL: http://user-service:8082
    ports:
      - "8081:8081"
    networks:
      - trae-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
      elasticsearch:
        condition: service_healthy
      user-service:
        condition: service_healthy

  user-service:
    build: ./services/user-service
    restart: unless-stopped
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: trae_user
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: root
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8082:8082"
    networks:
      - trae-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started

  log-service:
    build: ./services/log-service
    restart: unless-stopped
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ES_URIS: http://elasticsearch:9200
    ports:
      - "8083:8083"
    networks:
      - trae-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      kafka:
        condition: service_started
      elasticsearch:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    networks:
      - trae-net

  nginx-gateway:
    build: ./infrastructure/nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_logs:/var/log/nginx
    networks:
      - trae-net
    depends_on:
      # 仅控制启动顺序；运行期可达性由 Nginx 动态 DNS 解析保障
      frontend:
        condition: service_started
      admin-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      log-service:
        condition: service_started

networks:
  trae-net:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  es_data:
  nginx_logs:
