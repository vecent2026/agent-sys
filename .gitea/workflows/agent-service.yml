name: Build and Deploy Agent Service

on:
  push:
    branches:
      - main
    paths:
      - 'services/agent-service/**'
      - '.gitea/workflows/agent-service.yml'
      - 'docker-compose.yml'
  workflow_dispatch:
    inputs:
      force-rebuild:
        description: 'Force rebuild without cache'
        required: false
        default: 'false'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      HTTP_PROXY: http://host.docker.internal:7897
      HTTPS_PROXY: http://host.docker.internal:7897
      NO_PROXY: localhost,127.0.0.1,gitea,172.17.0.1
    steps:
      - name: Checkout code
        uses: https://gitea.com/actions/checkout@v4

      - name: Set up Python
        uses: https://gitea.com/actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Build Docker Image
        run: |
          if [ "${{ github.event.inputs.force-rebuild }}" = "true" ]; then
            docker-compose build --no-cache agent-service
          else
            docker-compose build agent-service
          fi
        env:
          DOCKER_BUILDKIT: 1

      - name: Deploy Agent Service
        run: |
          docker-compose up -d agent-service
