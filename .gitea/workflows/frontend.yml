name: Frontend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'docker-compose.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:latest
    steps:
      - name: Install Git and Node.js
        run: |
          apt-get update -y
          apt-get install -y git nodejs npm
          node -v
          npm -v

      - name: Checkout code
        run: |
          git clone --depth 1 http://host.docker.internal:18080/gitea/management.git .
          git checkout main

      - name: Install npm dependencies
        run: |
          cd frontend
          npm install --legacy-peer-deps
        continue-on-error: false

      - name: Verify dependencies
        run: |
          if [ ! -d "frontend/node_modules" ]; then
            echo "Error: node_modules directory not found"
            exit 1
          fi
          echo "Dependencies installed successfully"

      - name: Build frontend
        run: |
          cd frontend
          npm run build
        continue-on-error: false

      - name: Verify build
        run: |
          if [ ! -d "frontend/dist" ]; then
            echo "Error: dist directory not found"
            exit 1
          fi
          echo "Frontend built successfully"

      - name: Install Docker Compose
        run: |
          apt-get update
          apt-get install -y docker-compose-plugin
          docker compose version

      - name: Build and Deploy
        run: |
          docker compose build frontend
          docker compose up -d frontend
        continue-on-error: false

      - name: Verify deployment
        run: |
          sleep 5
          if [ -z "$(docker ps -q -f name=frontend)" ]; then
            echo "Error: Frontend container not running"
            docker logs frontend || true
            exit 1
          fi
          echo "Frontend deployed successfully"

      - name: Notify on failure
        if: failure()
        run: |
          echo "Frontend CI/CD workflow failed"
          # 可扩展为 Slack 通知、邮件通知等