name: Frontend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'docker-compose.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:latest
    steps:
      - name: Install Git, Node.js and Docker
        run: |
          apt-get update -y
          apt-get install -y git nodejs npm curl ca-certificates gnupg
          node -v
          npm -v
          
          # Install Docker CLI using Aliyun mirror
          install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://mirrors.aliyun.com/docker-ce/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
          chmod a+r /etc/apt/keyrings/docker.gpg
          
          echo \
            "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://mirrors.aliyun.com/docker-ce/linux/ubuntu \
            $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | \
            tee /etc/apt/sources.list.d/docker.list > /dev/null
            
          apt-get update
          apt-get install -y docker-ce-cli docker-compose-plugin
          
          docker --version
          docker compose version

      - name: Checkout code
        run: |
          git clone --depth 1 http://host.docker.internal:18080/gitea/management.git .
          git checkout main

      - name: Install npm dependencies
        run: |
          cd frontend
          npm install --legacy-peer-deps
        continue-on-error: false

      - name: Verify dependencies
        run: |
          if [ ! -d "frontend/node_modules" ]; then
            echo "Error: node_modules directory not found"
            exit 1
          fi
          echo "Dependencies installed successfully"

      - name: Build frontend
        run: |
          cd frontend
          npm run build
        continue-on-error: false

      - name: Verify build
        run: |
          if [ ! -d "frontend/dist" ]; then
            echo "Error: dist directory not found"
            exit 1
          fi
          echo "Frontend built successfully"

      - name: Build and Deploy
        run: |
          cd frontend
          docker build -t frontend:latest .
          docker stop frontend || true
          docker rm frontend || true
          docker run -d --name frontend --network trae-net -p 8080:80 frontend:latest
        continue-on-error: false

      - name: Verify deployment
        run: |
          sleep 5
          if [ -z "$(docker ps -q -f name=frontend)" ]; then
            echo "Error: Frontend container not running"
            docker logs frontend || true
            exit 1
          fi
          echo "Frontend deployed successfully"

      - name: Notify on failure
        if: failure()
        run: |
          echo "Frontend CI/CD workflow failed"
          # 可扩展为 Slack 通知、邮件通知等