name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      HTTP_PROXY: http://172.17.0.1:7897
      HTTPS_PROXY: http://172.17.0.1:7897
      NO_PROXY: localhost,127.0.0.1,gitea
    steps:
      - name: Checkout code
        uses: https://gitea.com/actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: https://gitea.com/actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build Admin Service
        run: |
          cd services/admin-service
          mvn clean package -DskipTests

      - name: Build Log Service
        run: |
          cd services/log-service
          mvn clean package -DskipTests

      - name: Set up Docker Buildx
        uses: https://gitea.com/docker/setup-buildx-action@v2

      - name: Build and Push Docker Images
        run: |
          docker-compose build
          # 如果有私有仓库，可以在这里添加 push 步骤
          # docker-compose push

      - name: Deploy
        run: |
          docker-compose up -d
