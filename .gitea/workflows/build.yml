name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      HTTP_PROXY: http://host.docker.internal:7897
      HTTPS_PROXY: http://host.docker.internal:7897
      NO_PROXY: localhost,127.0.0.1,gitea,172.17.0.1
    steps:
      - name: Checkout code
        uses: https://gitea.com/actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: https://gitea.com/actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set up Maven
        run: |
          curl -fsSL https://archive.apache.org/dist/maven/maven-3/3.9.6/binaries/apache-maven-3.9.6-bin.tar.gz | tar xzf - -C /opt
          echo "/opt/apache-maven-3.9.6/bin" >> $GITHUB_PATH

      - name: Build Admin Service
        run: |
          cd services/admin-service
          mvn clean package -DskipTests

      - name: Build Log Service
        run: |
          cd services/log-service
          mvn clean package -DskipTests

      - name: Set up Docker Buildx
        uses: https://gitea.com/docker/setup-buildx-action@v2

      - name: Install Docker Compose
        run: |
          curl -fsSL "https://github.com/docker/compose/releases/download/v2.24.0/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          chmod +x /usr/local/bin/docker-compose
          docker-compose --version

      - name: Build Docker Images
        run: |
          docker-compose build
        env:
          HTTP_PROXY: http://host.docker.internal:7897
          HTTPS_PROXY: http://host.docker.internal:7897
          NO_PROXY: localhost,127.0.0.1,gitea,172.17.0.1

      - name: Deploy
        run: |
          docker-compose up -d
