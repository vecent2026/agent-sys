resolver 127.0.0.11 valid=10s ipv6=off;
resolver_timeout 3s;

upstream frontend_service {
    zone frontend_service 64k;
    server frontend:80 resolve;
}

upstream admin_service {
    zone admin_service 64k;
    server admin-service:8081 resolve;
}

upstream user_service {
    zone user_service 64k;
    server user-service:8082 resolve;
}

upstream log_service {
    zone log_service 64k;
    server log-service:8083 resolve;
}

server {
    listen 80;
    server_name localhost;

    client_max_body_size 10M;

    # ── 静态资源缓存 ──────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://frontend_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── 平台端入口（platform.html） ───────────────────────
    location = /platform.html {
        proxy_pass http://frontend_service/platform.html;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location ^~ /platform {
        # 用 ^ 精确匹配当前 URI 并无条件重写为 /platform.html（break 不重新匹配 location）
        rewrite ^ /platform.html break;
        proxy_pass http://frontend_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── 平台端 API ────────────────────────────────────────
    location ^~ /api/platform/ {
        proxy_pass http://admin_service/api/platform/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── 租户端 API ────────────────────────────────────────
    location ^~ /api/tenant/ {
        proxy_pass http://admin_service/api/tenant/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── 旧版兼容 API（AuthController /api/auth） ──────────
    location ^~ /api/auth {
        proxy_pass http://admin_service/api/auth;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── 已下线旧接口：/api/logs ──────────────────────────
    location ^~ /api/logs {
        return 404;
    }

    # ── user-service API ──────────────────────────────────
    location ^~ /api/v1/app-users {
        proxy_pass http://user_service/api/v1/app-users;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /api/user {
        proxy_pass http://user_service/api/user;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /api/v1/user-tags {
        proxy_pass http://user_service/api/v1/user-tags;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /api/v1/tag-categories {
        proxy_pass http://user_service/api/v1/tag-categories;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /api/v1/user-fields {
        proxy_pass http://user_service/api/v1/user-fields;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Swagger/Actuator（开发用） ─────────────────────────
    location ^~ /admin/swagger-ui {
        proxy_pass http://admin_service/swagger-ui;
        proxy_set_header Host $host;
    }
    location ^~ /admin/v3/api-docs {
        proxy_pass http://admin_service/v3/api-docs;
        proxy_set_header Host $host;
    }

    # ── 前端 SPA 兜底（租户端） ────────────────────────────
    location / {
        proxy_pass http://frontend_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
